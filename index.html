<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discount</title>
</head>

<style>
    #modalpromo {
        display: none;
        position: fixed;
        z-index: 999;
        left: 0;
        top: 0;
        width: 100dvw;
        height: 100dvh;
        background-color: aliceblue;
    }
</style>
<body>
    <div id="modalpromo">
        <div
        style="
        background-color: white;
        margin: 15% auto;
        padding: 30px;
        width: 30dvw;
        text-align: center;
        border-radius: 15px;
        position: relative;
        "
        >

        <span
        onclick="closePromo()"
        style="
            position: absolute;
            right: 15px;
            top: 10px;
            cursor: pointer;
            font-size: 20px;"
            >
            &times;
        </span>

        <h2 style="color: orange;">KHUSUS HARI INI!</h2>
        <p>
            Gunakan kode <b>BARU20</b> untuk diskon 20% pada pembelian pertama Anda
        </p>
        <button
        onclick="closePromo()"
        style="
            background: orange;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer"
            >
            AMBIL DISKON
        </button>
        </div>
    </div>
</body>
<script>
    setTimeout(() => {
        document.getElementById("modalpromo").style.display= "block";
    }, 5000);

    function closePromo() {
        document.getElementById("modalpromo").style.display = "none";
    }
</script>
</html>
